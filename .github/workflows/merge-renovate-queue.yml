name: Merge Renovate Queue

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *' # Toutes les heures

jobs:
  merge-queue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Merge Renovate PRs in queue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Récupérer toutes les PRs ouvertes de Renovate
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              creator: 'renovate[bot]',
              sort: 'created',
              direction: 'asc'
            });

            console.log(`🔍 Trouvé ${prs.data.length} PR(s) Renovate`);

            // Pour chaque PR, vérifier si elle peut être mergée
            for (const pr of prs.data) {
              console.log(`\n📋 PR #${pr.number}: ${pr.title}`);

              // Vérifier les checks
              const checkRuns = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: pr.head.sha
              });

              const allChecksCompleted = checkRuns.data.check_runs.length > 0;
              const allChecksPassed = checkRuns.data.check_runs.every(
                check => check.status === 'completed' && check.conclusion === 'success'
              );

              console.log(`✅ Checks complétés: ${allChecksCompleted}`);
              console.log(`✅ Checks passés: ${allChecksPassed}`);
              console.log(`✅ Mergeable: ${pr.mergeable}`);

              // Merger si les conditions sont remplies
              if (pr.mergeable && allChecksPassed && allChecksCompleted) {
                try {
                  console.log(`🚀 Merge de PR #${pr.number}...`);
                  
                  await github.rest.pulls.merge({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: pr.number,
                    merge_method: 'squash',
                    commit_title: `${pr.title} (#${pr.number})`,
                    commit_message: pr.body
                  });

                  console.log(`✨ PR #${pr.number} mergée avec succès!`);
                } catch (error) {
                  console.log(`❌ Erreur lors du merge de PR #${pr.number}: ${error.message}`);
                }
              } else {
                console.log(`⏳ PR #${pr.number} ne peut pas être mergée (en attente de checks ou non mergeable)`);
              }
            }

            if (prs.data.length === 0) {
              console.log(`✅ Aucune PR Renovate en attente`);
            }
